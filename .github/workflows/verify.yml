name: verify

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  drc-fab-sim:
    name: DRC + fab + SPICE pre-flight
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install KiCad 9 (stable, has the same .kicad_pcb format as 10)
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          # Install full library set (footprints + symbols + 3D models),
          # not just kicad-libraries — the metapackage doesn't always pull
          # the connector/HRO footprints we use.
          sudo apt-get install -y --no-install-recommends \
            kicad \
            kicad-libraries \
            kicad-footprints \
            kicad-symbols \
            kicad-templates \
            ngspice \
            nodejs \
            npm \
            poppler-utils \
            inkscape \
            libcairo2-dev \
            libgirepository1.0-dev \
            pkg-config

      - name: Sanity check footprint library paths
        run: |
          echo "Searching for HRO USB-C footprint..."
          find /usr/share/kicad -name 'USB_C_Receptacle_HRO*' 2>/dev/null | head
          echo "Connector_USB.pretty contents:"
          ls /usr/share/kicad/footprints/Connector_USB.pretty/ 2>/dev/null | head -20
          echo "KICAD_FOOTPRINT_DIR auto-detect target:"
          ls -la /usr/share/kicad/footprints/ 2>/dev/null | head -5

      - name: Install netlistsvg
        run: |
          # Retry up to 3 times — npm registry occasionally hands out ECONNRESET on cold runners.
          for i in 1 2 3; do
            sudo npm install -g netlistsvg && break
            echo "netlistsvg install attempt $i failed; retrying after 5s..."
            sleep 5
          done

      - name: Install circuit_toolkit (with docs + sim extras)
        run: |
          # KiCad's bundled Python on Linux IS the system /usr/bin/python3 — pcbnew is in
          # /usr/lib/python3/dist-packages and importable directly. So we install into
          # the system Python, not a venv (a venv would not see pcbnew).
          # PEP 508 syntax: name[extras] @ git+url to attach extras to a VCS install.
          sudo /usr/bin/python3 -m pip install --break-system-packages \
            "circuit_toolkit[docs,sim] @ git+https://github.com/nickleassdimebutt/kicad-claude-toolkit.git#subdirectory=python/circuit_toolkit"

      - name: Sanity check (KiCad + ngspice CLI + pcbnew + sim importable)
        run: |
          kicad-cli version
          # ngspice -v exits 0 silently when invoked non-interactively without
          # a deck — use --version (which the CLI does honour) or just probe
          # presence on PATH.
          which ngspice && ngspice --version 2>&1 | head -3 || true
          python3 -c "import pcbnew; print('pcbnew OK', pcbnew.GetBuildVersion())"
          python3 -c "from circuit_toolkit.sim import simulate_op; print('sim OK')"

      - name: Build (PCB + schematic + BOM + datasheet + SPICE pre-flight)
        env:
          KICAD_CLI: /usr/bin/kicad-cli
          KICAD_PY:  /usr/bin/python3
          NGSPICE:   /usr/bin/ngspice
        run: |
          # SPICE pre-flight re-enabled: the toolkit now invokes ngspice via
          # subprocess rather than PySpice's DLL bindings, so it works on any
          # ngspice CLI the system provides regardless of version.
          python3 build.py --datasheet --sim --monte-carlo-runs 30

      - name: DRC
        env:
          KICAD_CLI: /usr/bin/kicad-cli
        run: |
          mkdir -p output/drc
          kicad-cli pcb drc \
            --output output/drc/drc_report.txt \
            --units mm \
            usbc-3v3.kicad_pcb
          # Fail the job if any DRC errors
          errors=$(grep -c "; error" output/drc/drc_report.txt || true)
          unconn=$(grep -E "Found [^0].*unconnected" output/drc/drc_report.txt || true)
          echo "DRC: $errors errors; unconnected line: $unconn"
          test "${errors:-0}" -eq 0
          test -z "$unconn"

      - name: Verify required artefacts exist
        run: |
          set -e
          test -s usbc-3v3.kicad_pcb
          test -s output/docs/datasheet.pdf
          test -s output/render/render_top.png
          test -s output/render/render_bottom.png
          test -s output/fab/bom/bom.csv
          for n in transient load_step line_reg load_reg temp_sweep monte_carlo; do
            test -s "output/sim/${n}.png" || (echo "missing sim/${n}.png" && exit 1)
          done

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usbc-3v3-build-${{ github.sha }}
          path: |
            usbc-3v3.kicad_pcb
            output/docs/datasheet.pdf
            output/docs/schematic.svg
            output/render/*.png
            output/sim/*.png
            output/drc/drc_report.txt
            output/fab/bom/*.csv
          if-no-files-found: warn
          retention-days: 30
